version: "3.9"

services:
  api:
    build: .
    container_name: auction_api
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./reports:/app/reports
    environment:
      - DATABASE_URL=sqlite:////app/data/auction_marketplace.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  pipeline:
    build: .
    container_name: auction_pipeline
    command: >
      sh -c "
        python scripts/generate_data.py &&
        python scripts/preprocess.py &&
        python scripts/feature_engineering.py &&
        python scripts/train_segmentation.py &&
        python scripts/train_model.py &&
        python scripts/init_db.py
      "
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./reports:/app/reports
    profiles:
      - pipeline
